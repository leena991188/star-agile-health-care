apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-webapp
  labels:
    app: healthcare-webapp
spec:
  replicas: 1  # Adjust the number of replicas as needed
  selector:
    matchLabels:
      app: healthcare-webapp
  template:
    metadata:
      labels:
        app: healthcare-webapp
    spec:
      containers:
        - name: healthcare-webapp
          image: leenab88/healthcare-webapp:latest  # Specify the version if needed
          ports:
            - containerPort: 80  # Port that the container listens on
